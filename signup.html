<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — LeadHunter</title>
  <style>
    :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#6c63ff;--accent2:#a78bfa;--green:#22c55e;--red:#ef4444;--text:#f1f1f1;--muted:#888;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid var(--border);}
    .nav-logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
    .nav-login{color:var(--muted);font-size:14px;text-decoration:none;}
    .nav-login:hover{color:var(--text);}
    .nav-login span{color:var(--accent2);}

    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;}
    .card-header{text-align:center;margin-bottom:32px;}
    .card-header h1{font-size:26px;font-weight:800;margin-bottom:8px;}
    .card-header p{color:var(--muted);font-size:15px;}

    .form-group{margin-bottom:18px;}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;}
    input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--accent);}
    input::placeholder{color:#444;}
    input.error{border-color:var(--red);}

    .btn-submit{width:100%;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;color:#fff;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
    .btn-submit:hover{opacity:0.9;}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;border-top:1px solid var(--border);}

    .terms{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6;}
    .terms a{color:var(--accent2);text-decoration:none;}
    .login-link{text-align:center;margin-top:20px;font-size:14px;color:var(--muted);}
    .login-link a{color:var(--accent2);text-decoration:none;font-weight:600;}
    .login-link a:hover{text-decoration:underline;}

    .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none;}
    .success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none;}

    .perks{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}
    .perk{display:flex;align-items:center;gap:8px;font-size:13px;color:#ccc;}
    .perk span:first-child{color:var(--green);}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">⚡ LeadHunter</a>
  <a class="nav-login" href="login.html">Already have an account? <span>Log in</span></a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <h1>Start for free</h1>
      <p>No credit card required</p>
    </div>

    <div class="perks">
      <div class="perk"><span>✓</span> 5 free searches every month</div>
      <div class="perk"><span>✓</span> AI lead scoring on every result</div>
      <div class="perk"><span>✓</span> Owner names, phones & addresses</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="fullName" placeholder="John Smith" />
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="john@agency.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" />
    </div>
    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" />
    </div>

    <button class="btn-submit" id="submitBtn" onclick="signUp()">Create Free Account →</button>

    <p class="terms">By signing up you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.</p>
    <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://hysngrxzysorzxlbytjq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5c25ncnh6eXNvcnp4bGJ5dGpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTMzNTMsImV4cCI6MjA4OTgyOTM1M30.sG4g5WhReJqSe7kUES9g8AVrzh83QvGMRUg5kT0whJ8'
  );

  // If already logged in, go straight to app
  sb.auth.getSession().then(({ data }) => {
    if (data.session) location.href = 'app.html';
  });

  async function signUp() {
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('submitBtn');
    const errMsg = document.getElementById('errorMsg');
    const okMsg = document.getElementById('successMsg');

    errMsg.style.display = 'none';
    okMsg.style.display = 'none';

    if (!name) { showError('Please enter your full name.'); return; }
    if (!email) { showError('Please enter your email address.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Create Free Account →';
      return;
    }

    okMsg.textContent = '✓ Account created! Taking you to the app...';
    okMsg.style.display = 'block';
    setTimeout(() => location.href = 'app.html', 1200);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
