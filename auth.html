<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up / Log In — LeadHunter</title>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --accent: #6c63ff; --accent2: #a78bfa; --green: #22c55e;
      --red: #ef4444; --text: #f1f1f1; --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-home { color: var(--muted); font-size: 14px; text-decoration: none; }
    .nav-home:hover { color: var(--text); }

    .page { flex: 1; display: flex; align-items: stretch; justify-content: center; padding: 0; }

    .auth-container {
      display: flex; width: 100%;
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }

    /* ── Sliding panel ── */
    .slide-panel {
      width: 50%; background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center; transition: transform 0.5s cubic-bezier(0.77,0,0.18,1);
      position: absolute; top: 0; bottom: 0; left: 0; z-index: 10;
    }
    .auth-container.show-login .slide-panel { transform: translateX(100%); }
    .slide-panel h2 { font-size: 26px; font-weight: 800; margin-bottom: 12px; color: #fff; }
    .slide-panel p { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.6; margin-bottom: 28px; }
    .slide-btn {
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5);
      color: #fff; padding: 12px 32px; border-radius: 10px; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .slide-btn:hover { background: rgba(255,255,255,0.25); }
    .slide-logo { font-size: 32px; margin-bottom: 20px; }

    /* ── Forms ── */
    .forms-wrap { width: 100%; position: relative; overflow: hidden; }

    .form-panel {
      width: 50%; padding: 44px 36px; display: flex; flex-direction: column;
      justify-content: center; position: absolute; top: 0; bottom: 0;
      transition: transform 0.5s cubic-bezier(0.77,0,0.18,1);
    }
    .form-panel.signup-panel { left: 50%; transform: translateX(0); }
    .form-panel.login-panel  { left: 0; transform: translateX(-100%); }

    .auth-container.show-login .form-panel.signup-panel { transform: translateX(100%); }
    .auth-container.show-login .form-panel.login-panel  { transform: translateX(0); }

    .form-panel h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .form-panel .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #444; }

    .btn-submit {
      width: 100%; background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none; color: #fff; padding: 13px; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
    .success-msg { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }

    .terms { font-size: 12px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; }
    .terms a { color: var(--accent2); text-decoration: none; }

    .forgot { display: block; text-align: right; font-size: 12px; color: var(--accent2); text-decoration: none; margin-top: -10px; margin-bottom: 16px; }
    .forgot:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .auth-container { flex-direction: column; min-height: unset; }
      .slide-panel { position: relative; width: 100%; transform: none !important; }
      .form-panel { width: 100%; margin-left: 0 !important; transform: none !important; padding: 32px 24px; }
      .form-panel.login-panel { display: none; }
      .auth-container.show-login .form-panel.signup-panel { display: none; }
      .auth-container.show-login .form-panel.login-panel { display: flex; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">⚡ LeadHunter</a>
  <a class="nav-home" href="index.html">← Back to home</a>
</nav>

<div class="page">
  <div class="auth-container" id="authContainer">

    <!-- Sliding branding panel -->
    <div class="slide-panel" id="slidePanel">
      <div class="slide-logo">⚡</div>
      <h2 id="slideTitle">Already got an account?</h2>
      <p id="slideText">Log in to access your leads, search history and account settings.</p>
      <button class="slide-btn" id="slideBtn" onclick="toggleMode()">Log In</button>
    </div>

    <!-- Forms wrapper -->
    <div class="forms-wrap">

      <!-- Sign Up -->
      <div class="form-panel signup-panel">
        <h2>Create your account</h2>
        <p class="sub">Free to start — no card required</p>
        <div class="error-msg" id="signupError"></div>
        <div class="success-msg" id="signupSuccess"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="John Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="john@agency.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="At least 8 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Repeat password" />
        </div>
        <button class="btn-submit" id="signupBtn" onclick="signUp()">Create Free Account →</button>
        <p class="terms">By signing up you agree to our <a href="terms.html">Terms</a> & <a href="privacy.html">Privacy Policy</a></p>
      </div>

      <!-- Log In -->
      <div class="form-panel login-panel">
        <h2>Welcome back</h2>
        <p class="sub">Log in to your LeadHunter account</p>
        <div class="error-msg" id="loginError"></div>
        <div class="success-msg" id="loginSuccess"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="john@agency.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" />
        </div>
        <a href="#" class="forgot" onclick="forgotPassword()">Forgot password?</a>
        <button class="btn-submit" id="loginBtn" onclick="logIn()">Log In →</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://hysngrxzysorzxlbytjq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5c25ncnh6eXNvcnp4bGJ5dGpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTMzNTMsImV4cCI6MjA4OTgyOTM1M30.sG4g5WhReJqSe7kUES9g8AVrzh83QvGMRUg5kT0whJ8'
  );

  // If already logged in go to app
  sb.auth.getSession().then(({ data }) => {
    if (data.session) location.href = 'app.html';
  });

  // Check URL param to start on login side
  window.addEventListener('DOMContentLoaded', () => {
    if (new URLSearchParams(location.search).get('mode') === 'login') {
      showLogin();
    }
  });

  let isLogin = false;

  function toggleMode() {
    isLogin ? showSignup() : showLogin();
  }

  function showLogin() {
    isLogin = true;
    document.getElementById('authContainer').classList.add('show-login');
    document.getElementById('slideTitle').textContent = "Don't have an account?";
    document.getElementById('slideText').textContent = "Sign up for free and start finding leads in under 60 seconds.";
    document.getElementById('slideBtn').textContent = "Sign Up";
  }

  function showSignup() {
    isLogin = false;
    document.getElementById('authContainer').classList.remove('show-login');
    document.getElementById('slideTitle').textContent = "Already got an account?";
    document.getElementById('slideText').textContent = "Log in to access your leads, search history and account settings.";
    document.getElementById('slideBtn').textContent = "Log In";
  }

  async function signUp() {
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    const btn      = document.getElementById('signupBtn');

    document.getElementById('signupError').style.display = 'none';
    document.getElementById('signupSuccess').style.display = 'none';

    if (!name)              return showErr('signupError', 'Please enter your full name.');
    if (!email)             return showErr('signupError', 'Please enter your email.');
    if (password.length < 8) return showErr('signupError', 'Password must be at least 8 characters.');
    if (password !== confirm) return showErr('signupError', 'Passwords do not match.');

    btn.disabled = true; btn.textContent = 'Creating account...';

    const { error: signUpError } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (signUpError) { showErr('signupError', signUpError.message); btn.disabled = false; btn.textContent = 'Create Free Account →'; return; }

    const { data: signInData, error: signInError } = await sb.auth.signInWithPassword({ email, password });
    if (signInError) { showErr('signupError', 'Account created — please log in.'); showLogin(); return; }

    await sb.from('profiles').insert({ id: signInData.user.id, full_name: name, plan: 'free' });

    document.getElementById('signupSuccess').textContent = '✓ Account created! Taking you to the app...';
    document.getElementById('signupSuccess').style.display = 'block';
    setTimeout(() => location.href = 'app.html', 800);
  }

  async function logIn() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    document.getElementById('loginError').style.display = 'none';

    if (!email)    return showErr('loginError', 'Please enter your email.');
    if (!password) return showErr('loginError', 'Please enter your password.');

    btn.disabled = true; btn.textContent = 'Logging in...';

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showErr('loginError', 'Incorrect email or password. Please try again.'); btn.disabled = false; btn.textContent = 'Log In →'; return; }

    document.getElementById('loginSuccess').textContent = '✓ Logged in! Taking you to the app...';
    document.getElementById('loginSuccess').style.display = 'block';
    setTimeout(() => location.href = 'app.html', 800);
  }

  async function forgotPassword() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return showErr('loginError', 'Enter your email above first.');
    await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/auth.html' });
    document.getElementById('loginSuccess').textContent = '✓ Password reset email sent — check your inbox.';
    document.getElementById('loginSuccess').style.display = 'block';
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
